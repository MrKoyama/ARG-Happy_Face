<style>
:root {

body {

header {

}

.logo {

}

}

.search-container {

}

.search-container input {

    font-size: 14px;

    border: 1px solid var(--border-color);
    color: var(--text-color);
    border-radius: 4px 0 0 4px;
    outline: none;
    width: 200px;
}

.search-container input::placeholder {
    color: #888;
}

.search-container input:focus {
    border-color: var(--text-color);
}

.search-container button {
    padding: 8px 15px;
    background-color: var(--text-color);
    color: var(--bg-color);
    border: none;
    border-radius: 0 4px 4px 0;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    transition: background-color 0.3s, color 0.3s;
}

.search-container button:hover {
    background-color: var(--accent-color);
    color: var(--text-color);
}

.global-nav {
    background-color: #000;
    border-bottom: 1px solid var(--border-color);
}

.global-nav ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
}

.global-nav li a {
    display: block;
    color: #aaa;
    text-decoration: none;
    padding: 15px 30px;
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: color 0.3s;
}

.global-nav li a:hover {
    color: var(--text-color);
    background-color: #222;
}

.page-header {
    background-color: #111;
    padding: 40px 0;

    border-bottom: 1px solid var(--border-color);

.page-title {

    letter-spacing: 2px;

main {

    margin: 60px auto;
    padding: 0 20px;
    min-height: 400px;

.result-list {
    display: flex;
    flex-direction: column;

.result-card {
    background-color: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 4px;
    padding: 30px;
    text-decoration: none;
    color: var(--text-color);
    transition: transform 0.3s, border-color 0.3s, background-color 0.3s;
    display: flex;

.result-card:hover {

    border-color: #888;

}

.result-category {
    font-size: 12px;
    color: var(--accent-color);
    font-weight: bold;
    margin-bottom: 10px;
    letter-spacing: 1px;

.result-name {

    margin-top: 0;

    letter-spacing: 1px;

.result-desc {

    color: #ccc;
    line-height: 1.8;
    margin: 0;
}

.result-url {
    font-size: 13px;
    color: #666;
    margin-top: 15px;
    font-family: monospace;
}

.no-result {
    text-align: center;
    padding: 80px 0;
    color: #666;
}

.no-result h2 {
    font-size: 24px;
    margin-bottom: 20px;
    text-transform: uppercase;
}

.no-result p {
    font-size: 16px;
}

footer {
    background-color: #000;
    padding: 40px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-size: 12px;
    color: #666;
    border-top: 1px solid var(--border-color);
    margin-top: 80px;
}

.footer-text {
    line-height: 1.6;
}

.footer-level {
    font-family: monospace;
    font-size: 14px;
    white-space: nowrap;
    margin-left: 20px;
    color: #444;
}

@media (max-width: 768px) {
    header {
        flex-direction: column;
        padding: 20px;
    }
    
    .logo {
        margin-bottom: 20px;
    }

    .search-container input {
        width: 100%;
    }

    .global-nav ul {
        flex-direction: column;
        text-align: center;
    }

    .global-nav li a {
        padding: 12px 20px;
        border-bottom: 1px solid #222;
    }

    .result-card {
        padding: 20px;
    }

    footer {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .footer-level {
        margin-left: 0;
        margin-top: 15px;
    }
}
</style>
</head>
<body>

<header>

<main>

<script>

                displayUrl: "life_meat_store.html#flavor-plain",
                description: "肉本来の野性味あふれる旨味と、噛みごたえのある食感をダイレクトに味わえる王道のプレーンテイスト。塩とわずかな香辛料のみのシンプルな味付け。"
            },
            {

                title: "究極の肉まみれ 野性チャーハン",
                url: "life_meat_recipe.html",
                displayUrl: "life_meat_recipe.html",

            }
        ]
    },
    {
        keywords: ["スパイシー", "spicy", "辛い", "ペッパー"],
        results: [
            {
                category: "STORE / ITEM",
                title: "LIFE MEAT SPICY",
                url: "life_meat_store.html#flavor-spicy",
                displayUrl: "life_meat_store.html#flavor-spicy",
                description: "厳選された粗挽きブラックペッパーと特製チリパウダーをブレンド。一口食べればピリッとした刺激が肉の旨味を引き立てます。"
            },
            {
                category: "RECIPE",
                title: "地獄のチーズ・チリナチョス",
                url: "life_meat_recipe.html",
                displayUrl: "life_meat_recipe.html",
                description: "【使用フレーバー：SPICY】ビールを無限に消費する背徳のツマミ。スパイシーの刺激と濃厚なチーズの海に溺れる、至高のナチョスアレンジ。"
            }
        ]
    },
    {
        keywords: ["バーベキュー", "bbq", "barbecue", "甘辛", "キャンプ"],
        results: [
            {
                category: "STORE / ITEM",
                title: "LIFE MEAT BARBECUE",
                url: "life_meat_store.html#flavor-bbq",

                description: "スモーキーな香りと濃厚な甘辛BBQソースが肉に絡みつく。温かいご飯に乗せるだけで極上の丼が完成するアウトドアにも最適なフレーバー。"
            },
            {
                category: "RECIPE",
                title: "豪快！山賊焼き風グリル",
                url: "life_meat_recipe.html",
                displayUrl: "life_meat_recipe.html",
                description: "【使用フレーバー：BARBECUE】自然の中で肉を喰らう本能を満たす。BARBECUEの濃厚なソースが焦げる香りで周囲の視線を独占する豪快キャンプ飯。"

        ]
    },
    {

        results: [

                title: "LIFE MEAT HERB & LEMON",
                url: "life_meat_store.html#flavor-herb",

                description: "爽やかなレモンの酸味と数種のハーブが香る、さっぱりとした後味が特徴。女性にも人気でサラダのトッピングにも最適です。"

        ]
    },
    {
        keywords: ["ガーリック", "オニオン", "garlic", "onion", "にんにく"],
        results: [

    },
    {

        results: [

                url: "life_meat_notice.html",

    },
    {
        keywords: ["代替タンパク質"],
        results: [
            {

                url: "life_meat_protein.html",
                description: "次世代タンパク質の革新"
            }
        ]
    },
    {
        keywords: ["オメガ・ライフケア・グループ"],
        results: [
            {
                category: "COMPANY",
                title: "GROUP & PARTNERSHIP",
                url: "life_meat_company.html",
                description: "親会社とのシナジーによる革新"
            }
        ]
    }
];

// URLからクエリを取得
const urlParams = new URLSearchParams(window.location.search);
const query = urlParams.get('q') || '';

// 画面に検索ワードを表示
document.getElementById('displayQuery').textContent = query;
document.getElementById('searchInput').value = query;

const resultList = document.getElementById('resultList');

// 検索処理と結果の描画
function renderResults(searchQuery) {
    resultList.innerHTML = '';
    
    if (!searchQuery.trim()) {
        showNoResult("Please enter a search term.");
        return;
    }

    const lowerQuery = searchQuery.toLowerCase();
    let foundResults = [];

    // データベースからキーワードが一致するものを探す
    searchDatabase.forEach(item => {
        const isMatch = item.keywords.some(keyword => lowerQuery.includes(keyword) || keyword.includes(lowerQuery));
        if (isMatch) {
            foundResults = foundResults.concat(item.results);
        }
    });

    // 重複を削除
    const uniqueResults = Array.from(new Set(foundResults.map(a => a.title)))
        .map(title => foundResults.find(a => a.title === title));

    // 結果の表示
    if (uniqueResults.length > 0) {
        uniqueResults.forEach(result => {
            const card = document.createElement('a');
            card.href = result.url;
            card.className = 'result-card';
            card.innerHTML = `
                <div class="result-category">${result.category}</div>
                <h2 class="result-name">${result.title}</h2>
                <p class="result-desc">${result.description}</p>
            `;
            resultList.appendChild(card);
        });
    } else {
        showNoResult("No results found.");
    }
}

// 検索結果がない場合の表示
function showNoResult(message) {
    resultList.innerHTML = `
        <div class="no-result">
            <h2>NOT FOUND</h2>
            <p>${message}<br>別のキーワードでお試しください。</p>
        </div>
    `;
}

// 初期描画
renderResults(query);

// 検索窓からの再検索
document.getElementById('searchForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var newQuery = document.getElementById('searchInput').value;
    if(newQuery.trim() !== "") {
        window.location.href = "?q=" + encodeURIComponent(newQuery);
    }
});
</script>

</body>
</html>
